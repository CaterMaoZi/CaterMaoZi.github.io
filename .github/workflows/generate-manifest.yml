name: Generate Manifest

on:
  push:
    branches: [main]
    paths:
      - 'dancing/data/**'
      - '!dancing/data/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 生成 manifest.json
        run: node dancing/scripts/generate-manifest.js

      - name: 检查是否有变更
        id: check
        run: |
          if git diff --quiet dancing/data/manifest.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "manifest 无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "manifest 已更新，准备提交"
          fi

      - name: 提交并推送
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dancing/data/manifest.json
          git commit -m "chore: auto-generate manifest.json [skip ci]"
          git push
